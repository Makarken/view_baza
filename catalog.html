<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Каталог / Catalog</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0e0e0e;
    --surface: #161616;
    --surface2: #1e1e1e;
    --border: #2a2a2a;
    --gold: #c9a84c;
    --gold-dim: #8a6f2e;
    --text: #e8e0d0;
    --text-dim: #7a7060;
    --text-mid: #b0a890;
    --green: #4caf7a;
    --green-dim: #1e3d2a;
    --blue: #5ba3c9;
    --blue-dim: #1a3040;
    --red: #c96060;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    border-bottom: 1px solid var(--border);
    padding: 28px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(14,14,14,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }

  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    font-weight: 300;
    letter-spacing: 0.12em;
    color: var(--gold);
    text-transform: uppercase;
  }

  .logo span {
    color: var(--text-dim);
    font-style: italic;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 24px;
  }

  .refresh-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 7px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--gold-dim); color: var(--gold); }

  #last-updated {
    font-size: 10px;
    color: var(--text-dim);
    letter-spacing: 0.05em;
  }

  /* STATS BAR */
  .stats-bar {
    display: flex;
    gap: 0;
    border-bottom: 1px solid var(--border);
    overflow-x: auto;
  }

  .stat {
    flex: 1;
    min-width: 140px;
    padding: 20px 28px;
    border-right: 1px solid var(--border);
  }
  .stat:last-child { border-right: none; }

  .stat-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 6px;
  }

  .stat-value {
    font-family: 'Cormorant Garamond', serif;
    font-size: 26px;
    font-weight: 300;
    color: var(--text);
  }

  .stat-value.gold { color: var(--gold); }
  .stat-value.green { color: var(--green); }

  /* FILTERS */
  .filters {
    padding: 20px 40px;
    display: flex;
    gap: 8px;
    align-items: center;
    border-bottom: 1px solid var(--border);
    flex-wrap: wrap;
  }

  .filter-label {
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-right: 8px;
  }

  .filter-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 0.08em;
    padding: 6px 14px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    border-radius: 2px;
  }

  .filter-btn:hover { border-color: var(--gold-dim); color: var(--text); }
  .filter-btn.active { 
    background: var(--gold); 
    border-color: var(--gold);
    color: #000;
  }

  .count-badge {
    margin-left: 6px;
    font-size: 9px;
    opacity: 0.7;
  }

  /* SEARCH */
  .search-wrap {
    margin-left: auto;
  }
  .search-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 7px 14px;
    outline: none;
    width: 180px;
    transition: border-color 0.2s;
  }
  .search-input::placeholder { color: var(--text-dim); }
  .search-input:focus { border-color: var(--gold-dim); }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 1px;
    background: var(--border);
    padding: 0;
  }

  /* CARD */
  .card {
    background: var(--bg);
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    animation: fadeIn 0.3s ease both;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card:hover { background: var(--surface); }

  .card-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .card-img-placeholder {
    width: 100%;
    aspect-ratio: 1 / 1;
    background: var(--surface2);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--border);
    font-size: 32px;
  }

  .card-body {
    padding: 16px 18px 20px;
    border-top: 1px solid var(--border);
  }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-bottom: 12px;
  }

  .card-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1;
  }

  .card-status {
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
  }

  .status-sold {
    background: var(--green-dim);
    color: var(--green);
    border: 1px solid #2a5a3a;
  }

  .status-money {
    background: var(--blue-dim);
    color: var(--blue);
    border: 1px solid #254060;
  }

  .status-active {
    background: #1e1a0e;
    color: var(--gold);
    border: 1px solid #3a2e0a;
  }

  .card-prices {
    display: flex;
    gap: 16px;
    margin-bottom: 10px;
  }

  .price-block {}

  .price-label {
    font-size: 8px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2px;
  }

  .price-value {
    font-size: 13px;
    color: var(--text-mid);
  }

  .price-value.main {
    font-family: 'Cormorant Garamond', serif;
    font-size: 20px;
    font-weight: 400;
    color: var(--text);
  }

  .card-profit {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding-top: 10px;
    border-top: 1px solid var(--border);
    margin-top: 4px;
  }

  .profit-val {
    font-size: 12px;
    color: var(--green);
  }

  .profit-pct {
    font-size: 11px;
    color: var(--text-dim);
  }

  .card-date {
    font-size: 9px;
    color: var(--text-dim);
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  /* LOADING / EMPTY */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 80px 40px;
    gap: 16px;
    color: var(--text-dim);
  }

  .loader-ring {
    width: 32px;
    height: 32px;
    border: 1px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loader-text {
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }

  .empty {
    padding: 80px 40px;
    text-align: center;
    color: var(--text-dim);
    font-size: 11px;
    letter-spacing: 0.1em;
  }

  /* MODAL */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    backdrop-filter: blur(4px);
  }

  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    max-width: 680px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    animation: modalIn 0.2s ease;
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96); }
    to   { opacity: 1; transform: scale(1); }
  }

  .modal-img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    display: block;
    background: var(--surface2);
  }

  .modal-body {
    padding: 28px 32px;
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
  }

  .modal-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 48px;
    font-weight: 300;
    color: var(--text-dim);
    line-height: 1;
  }

  .modal-close {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 6px 12px;
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.2s;
  }
  .modal-close:hover { border-color: var(--red); color: var(--red); }

  .modal-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 20px;
  }

  .modal-field {}

  .modal-field-label {
    font-size: 8px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .modal-field-value {
    font-size: 14px;
    color: var(--text);
  }

  .modal-field-value.big {
    font-family: 'Cormorant Garamond', serif;
    font-size: 28px;
    font-weight: 300;
  }

  .modal-field-value.green { color: var(--green); }
  .modal-field-value.gold { color: var(--gold); }

  .modal-source {
    margin-top: 16px;
    padding-top: 16px;
    border-top: 1px solid var(--border);
    font-size: 9px;
    color: var(--text-dim);
    word-break: break-all;
  }

  .modal-source a {
    color: var(--blue);
    text-decoration: none;
  }

  /* RESPONSIVE */
  @media (max-width: 600px) {
    header { padding: 18px 20px; }
    .stats-bar { flex-wrap: nowrap; overflow-x: scroll; }
    .filters { padding: 16px 20px; }
    .grid { grid-template-columns: repeat(2, 1fr); }
    .modal-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">Resale <span>catalog</span></div>
  <div class="header-right">
    <span id="last-updated"></span>
    <button class="refresh-btn" onclick="loadData()">↻ обновить</button>
  </div>
</header>

<div class="stats-bar" id="statsBar">
  <div class="stat">
    <div class="stat-label">Всего позиций</div>
    <div class="stat-value" id="st-total">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Продано</div>
    <div class="stat-value green" id="st-sold">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">В наличии</div>
    <div class="stat-value gold" id="st-active">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Оборот €</div>
    <div class="stat-value" id="st-turnover">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Прибыль €</div>
    <div class="stat-value green" id="st-profit">—</div>
  </div>
  <div class="stat">
    <div class="stat-label">Средняя накрутка</div>
    <div class="stat-value gold" id="st-avg-margin">—</div>
  </div>
</div>

<div class="filters">
  <span class="filter-label">Статус</span>
  <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Все <span class="count-badge" id="cnt-all"></span></button>
  <button class="filter-btn" data-filter="active" onclick="setFilter('active')">В наличии <span class="count-badge" id="cnt-active"></span></button>
  <button class="filter-btn" data-filter="sold" onclick="setFilter('sold')">Продано <span class="count-badge" id="cnt-sold"></span></button>
  <button class="filter-btn" data-filter="money" onclick="setFilter('money')">Деньги зашли <span class="count-badge" id="cnt-money"></span></button>
  <div class="search-wrap">
    <input class="search-input" type="text" placeholder="Поиск по номеру..." oninput="renderCards()" id="searchInput">
  </div>
</div>

<div id="main"></div>

<div id="modal" class="modal-overlay" style="display:none" onclick="closeModal(event)">
  <div class="modal" id="modalBox">
    <div id="modal-img-wrap"></div>
    <div class="modal-body">
      <div class="modal-header">
        <div class="modal-num" id="m-num"></div>
        <button class="modal-close" onclick="closeModalDirect()">✕ закрыть</button>
      </div>
      <div class="modal-grid">
        <div class="modal-field">
          <div class="modal-field-label">Себестоимость</div>
          <div class="modal-field-value big" id="m-cost"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Продажа</div>
          <div class="modal-field-value big green" id="m-sale"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Прибыль</div>
          <div class="modal-field-value big green" id="m-profit"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Накрутка</div>
          <div class="modal-field-value big gold" id="m-margin"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Статус</div>
          <div class="modal-field-value" id="m-status"></div>
        </div>
        <div class="modal-field">
          <div class="modal-field-label">Дата продажи</div>
          <div class="modal-field-value" id="m-date"></div>
        </div>
      </div>
      <div class="modal-source" id="m-source"></div>
    </div>
  </div>
</div>

<script>
// ── CONFIG ──────────────────────────────────────────────────────────────────
const SHEET_ID   = '1NfPXGGJaI7O6-CXxQPZULBq26ZQbpd4zEbMmxd9wZjA';
const CLOUDINARY = 'https://res.cloudinary.com/dv83mie7y/image/upload/resale-crm/workspace1/';
// ────────────────────────────────────────────────────────────────────────────

let allItems = [];
let currentFilter = 'all';

function cloudUrl(val) {
  if (!val) return null;
  val = val.trim();
  if (!val) return null;
  if (val.startsWith('http')) return null; // старые ibb.co — пропускаем
  return CLOUDINARY + val;
}

function parseNum(s) {
  if (!s) return null;
  const n = parseFloat(String(s).replace(',', '.'));
  return isNaN(n) ? null : n;
}

function fmt(n, suffix = '€') {
  if (n == null) return '—';
  return n.toLocaleString('ru-RU', {maximumFractionDigits: 2}) + ' ' + suffix;
}

function getStatus(row) {
  const s = (row['Статус'] || '').trim().toLowerCase();
  if (s.includes('продано')) return 'sold';
  if (s.includes('деньги')) return 'money';
  return 'active';
}

function statusLabel(s) {
  if (s === 'sold')   return '<span class="card-status status-sold">Продано</span>';
  if (s === 'money')  return '<span class="card-status status-money">Деньги зашли</span>';
  return '<span class="card-status status-active">В наличии</span>';
}

async function loadData() {
  const main = document.getElementById('main');
  main.innerHTML = `<div class="loader"><div class="loader-ring"></div><div class="loader-text">Загрузка данных</div></div>`;

  try {
    const url = `https://opensheet.elk.sh/${SHEET_ID}/1`;
    const res = await fetch(url);
    if (!res.ok) throw new Error('fetch failed');
    const raw = await res.json();

    allItems = raw.filter(row => {
      const n = row['Номер'] || row['номер'] || '';
      return /^\d+$/.test(String(n).trim());
    }).map(row => ({
      num:    String(row['Номер']).trim(),
      cost:   parseNum(row['Цена в евро']),
      sale:   parseNum(row['Продажа']),
      profit: parseNum(row['Прибыль']),
      margin: row['Накрутка'] || '',
      status: getStatus(row),
      date:   row['Дата продажи'] || '',
      photo:  row['Фото'] || '',
      source: row['Где'] || '',
    }));

    updateStats();
    renderCards();
    document.getElementById('last-updated').textContent =
      'обновлено ' + new Date().toLocaleTimeString('ru-RU', {hour:'2-digit', minute:'2-digit'});
  } catch(e) {
    main.innerHTML = `<div class="empty">Ошибка загрузки данных.<br>Убедись что таблица открыта для просмотра.</div>`;
  }
}

function updateStats() {
  const items = allItems;
  const sold  = items.filter(i => i.status === 'sold' || i.status === 'money');
  const active = items.filter(i => i.status === 'active');
  const turnover = sold.reduce((s, i) => s + (i.sale || 0), 0);
  const profit   = sold.reduce((s, i) => s + (i.profit || 0), 0);
  const margins  = sold.map(i => parseNum(i.margin)).filter(v => v != null);
  const avgMargin = margins.length ? margins.reduce((a,b) => a+b, 0) / margins.length : null;

  document.getElementById('st-total').textContent   = items.length;
  document.getElementById('st-sold').textContent    = sold.length;
  document.getElementById('st-active').textContent  = active.length;
  document.getElementById('st-turnover').textContent= fmt(turnover);
  document.getElementById('st-profit').textContent  = fmt(profit);
  document.getElementById('st-avg-margin').textContent = avgMargin ? avgMargin.toFixed(1) + '%' : '—';

  document.getElementById('cnt-all').textContent    = items.length;
  document.getElementById('cnt-active').textContent = active.length;
  document.getElementById('cnt-sold').textContent   = items.filter(i=>i.status==='sold').length;
  document.getElementById('cnt-money').textContent  = items.filter(i=>i.status==='money').length;
}

function renderCards() {
  const main   = document.getElementById('main');
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let items = allItems.filter(i => {
    if (currentFilter === 'sold')   return i.status === 'sold';
    if (currentFilter === 'money')  return i.status === 'money';
    if (currentFilter === 'active') return i.status === 'active';
    return true;
  });

  if (search) {
    items = items.filter(i => i.num.toLowerCase().includes(search));
  }

  if (!items.length) {
    main.innerHTML = `<div class="empty">Ничего не найдено</div>`;
    return;
  }

  const html = items.map((item, idx) => {
    const imgUrl = cloudUrl(item.photo);
    const imgHtml = imgUrl
      ? `<img class="card-img" src="${imgUrl}" alt="Позиция ${item.num}" loading="lazy" onerror="this.outerHTML='<div class=card-img-placeholder>◇</div>'">`
      : `<div class="card-img-placeholder">◇</div>`;

    const profitHtml = item.profit != null
      ? `<div class="card-profit">
           <span class="profit-val">+${fmt(item.profit)}</span>
           <span class="profit-pct">${item.margin || ''}</span>
         </div>`
      : '';

    const dateHtml = item.date
      ? `<div class="card-date">${item.date}</div>` : '';

    return `
    <div class="card" onclick="openModal(${idx})" style="animation-delay:${Math.min(idx * 0.03, 0.5)}s">
      ${imgHtml}
      <div class="card-body">
        <div class="card-top">
          <div class="card-num">${item.num}</div>
          ${statusLabel(item.status)}
        </div>
        <div class="card-prices">
          <div class="price-block">
            <div class="price-label">Себест.</div>
            <div class="price-value">${fmt(item.cost)}</div>
          </div>
          ${item.sale != null ? `<div class="price-block">
            <div class="price-label">Продажа</div>
            <div class="price-value main">${fmt(item.sale)}</div>
          </div>` : ''}
        </div>
        ${profitHtml}
        ${dateHtml}
      </div>
    </div>`;
  }).join('');

  main.innerHTML = `<div class="grid">${html}</div>`;
}

function setFilter(f) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.filter === f);
  });
  renderCards();
}

// MODAL
let filteredItems = [];

function openModal(idx) {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  let items = allItems.filter(i => {
    if (currentFilter === 'sold')   return i.status === 'sold';
    if (currentFilter === 'money')  return i.status === 'money';
    if (currentFilter === 'active') return i.status === 'active';
    return true;
  });
  if (search) items = items.filter(i => i.num.toLowerCase().includes(search));
  const item = items[idx];
  if (!item) return;

  const imgUrl = cloudUrl(item.photo);
  document.getElementById('modal-img-wrap').innerHTML = imgUrl
    ? `<img class="modal-img" src="${imgUrl}" alt="Позиция ${item.num}">`
    : '';

  document.getElementById('m-num').textContent    = '# ' + item.num;
  document.getElementById('m-cost').textContent   = fmt(item.cost);
  document.getElementById('m-sale').textContent   = fmt(item.sale);
  document.getElementById('m-profit').textContent = item.profit != null ? '+' + fmt(item.profit) : '—';
  document.getElementById('m-margin').textContent = item.margin || '—';
  document.getElementById('m-status').innerHTML   = statusLabel(item.status);
  document.getElementById('m-date').textContent   = item.date || '—';

  const src = item.source;
  document.getElementById('m-source').innerHTML = src && src.startsWith('http')
    ? `Источник: <a href="${src}" target="_blank" rel="noopener">${src.slice(0,60)}…</a>`
    : src ? `Источник: ${src}` : '';

  document.getElementById('modal').style.display = 'flex';
  document.body.style.overflow = 'hidden';
}

function closeModal(e) {
  if (e.target === document.getElementById('modal')) closeModalDirect();
}

function closeModalDirect() {
  document.getElementById('modal').style.display = 'none';
  document.body.style.overflow = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModalDirect();
});

loadData();
</script>
</body>
</html>
